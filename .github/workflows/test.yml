name: ZephLearn Frontend Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit + Integration Tests ──────────────────────────────────────────────
  unit-integration:
    name: Unit & Integration Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit & integration tests with coverage
        run: npm run test:ci
        env:
          # Prevents vitest from opening browser in CI
          CI: true
          # No real backend in CI — MSW handles all network calls
          VITE_API_BASE_URL: https://zeph-learn-backend.onrender.com
          VITE_GOOGLE_CLIENT_ID: ""

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage summary comment (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';
            if (!fs.existsSync(summaryPath)) return;
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const total = summary.total;
            const lines = total.lines.pct.toFixed(1);
            const functions = total.functions.pct.toFixed(1);
            const branches = total.branches.pct.toFixed(1);
            const statements = total.statements.pct.toFixed(1);
            const emoji = (pct) => parseFloat(pct) >= 70 ? '✅' : parseFloat(pct) >= 60 ? '🟡' : '🔴';
            const body = `## 📊 Coverage Report
            | Metric | Coverage | Status |
            |--------|----------|--------|
            | Lines | ${lines}% | ${emoji(lines)} |
            | Functions | ${functions}% | ${emoji(functions)} |
            | Branches | ${branches}% | ${emoji(branches)} |
            | Statements | ${statements}% | ${emoji(statements)} |
            
            > Threshold: 60% minimum. Raise to 70% as coverage improves.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ─── E2E Tests (Playwright) ───────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright — Chromium)
    runs-on: ubuntu-latest
    needs: unit-integration
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          VITE_API_BASE_URL: https://zeph-learn-backend.onrender.com
          VITE_GOOGLE_CLIENT_ID: ""
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 3

  # ─── Lint check ──────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true # Don't block CI on lint warnings during initial test adoption
